<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blog | Litispendence</title>

  <style>
    @import url("https://cdn.jsdelivr.net/npm/@fontsource/commit-mono@5.2.5/index.css");

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Commit Mono", monospace;
      font-size: 16px;
      line-height: 1.7;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    header {
      border: 1px solid #000000;
      padding: 20px;
      margin-bottom: 64px;
    }

    nav {
      margin-top: 24px;
    }

    nav a {
      color: #000000;
      text-decoration: none;
      margin-right: 20px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 40px;
      line-height: 1.2;
      font-weight: 400;
      margin: 0 0 24px;
    }

    h2 {
      font-size: 22px;
      line-height: 1.3;
      font-weight: 400;
      margin: 0 0 16px;
    }

    p {
      margin: 0 0 20px;
    }

    a {
      color: #000000;
      text-decoration: underline;
    }

    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid #000000;
      font-size: 14px;
    }

    .blog-item {
      padding-bottom: 32px;
      margin-bottom: 32px;
    }

    .date {
      margin-bottom: 16px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      body {
        font-size: 15px;
      }

      .page {
        padding: 24px 16px 48px;
      }

      h1 {
        font-size: 32px;
      }

      nav a {
        display: block;
        margin: 8px 0;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div>Litispendence</div>

      <nav>
        <a href="../index.html">Home</a>
        <a href="blog.html">Blog</a>
      </nav>
    </header>

    <main>
      <h1>Blog</h1>

      <section class="blog-item">
        <h2>Complicated world of programming</h2>

        <p class="date">
          June 2026
        </p>

        <p>
          My thoughts about programming and AI making things easier.
        </p>

        <p>
          <a href="blog-complicated-world-of-programming.html">Read post</a>
        </p>
      </section>
    </main>

    <footer>
      © 2026 Litispendence
    </footer>
  </div>
</body>
</html>
